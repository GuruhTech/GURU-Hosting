kind = "web"
previewPath = "/"
title = "GURU HOST"
version = "1.0.0"
id = "artifacts/guru-host"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20673

[services.development]
run = "pnpm --filter @workspace/guru-host run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guru-host", "run", "build" ]
publicDir = "artifacts/guru-host/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20673"
BASE_PATH = "/"
